# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test elasticsearch.yaml
templates:
  - elasticsearch.yaml
  - bigbang/sso-secret.yaml
release:
  name: eck
tests:
  - it: should work with default values
    template: elasticsearch.yaml
    asserts:
      - isKind:
          of: Elasticsearch
      - equal:
          path: metadata.name
          value: eck
      - notExists:
          path: spec.secureSettings

  - it: should render multiple secureSettings entries
    template: elasticsearch.yaml
    values:
      - values/multiple-secure-settings.yaml
    asserts:
      - equal:
          path: spec.secureSettings
          value:
            - secretName: first-secret
            - secretName: second-secret

  - it: should prepend sso secret before user secureSettings
    template: elasticsearch.yaml
    set:
      sso.enabled: true
    values:
      - values/multiple-secure-settings.yaml
    asserts:
      - equal:
          path: spec.secureSettings
          value:
            - secretName: sso-secret
            - secretName: first-secret
            - secretName: second-secret

  - it: should not render initContainers when both common and per-node are empty
    template: elasticsearch.yaml
    asserts:
      - notExists:
          path: spec.nodeSets[0].podTemplate.spec.initContainers

  - it: should include common.initContainers in master nodeSet
    template: elasticsearch.yaml
    values:
      - values/common-init-containers.yaml
    asserts:
      - equal:
          path: spec.nodeSets[0].podTemplate.spec.initContainers[0].name
          value: common-init

  - it: should prepend common.initContainers before per-node initContainers
    template: elasticsearch.yaml
    values:
      - values/combined-init-containers.yaml
    asserts:
      - equal:
          path: spec.nodeSets[0].podTemplate.spec.initContainers[0].name
          value: common-init
      - equal:
          path: spec.nodeSets[0].podTemplate.spec.initContainers[1].name
          value: master-init

  - it: should merge common.config into master nodeSet config
    template: elasticsearch.yaml
    set:
      elasticsearch.common.config.testkey: common-value
    asserts:
      - equal:
          path: spec.nodeSets[0].config.testkey
          value: common-value

  - it: per-node config should override common.config on conflict
    template: elasticsearch.yaml
    set:
      elasticsearch.common.config.testkey: common-value
      elasticsearch.master.config.testkey: per-node-value
    asserts:
      - equal:
          path: spec.nodeSets[0].config.testkey
          value: per-node-value
